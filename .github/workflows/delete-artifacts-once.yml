name: Delete all artifacts once

on:
  push:
    branches:
      - dev
    paths:
      - .github/workflows/delete-artifacts-once.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: delete-all-artifacts-once
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ['GH_TOKEN']
          repo = os.environ['GH_REPOSITORY']
          api = 'https://api.github.com'
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'umalauncher-artifact-cleanup',
          }

          def request(method, url, body=None):
              data = None
              request_headers = dict(headers)
              if body is not None:
                  data = json.dumps(body).encode('utf-8')
                  request_headers['Content-Type'] = 'application/json'
              req = urllib.request.Request(url, data=data, headers=request_headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      if response.status == 204:
                          return None
                      raw = response.read()
                      return json.loads(raw.decode('utf-8')) if raw else None
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode('utf-8', errors='replace')
                  print(f'{method} {url} failed with HTTP {exc.code}: {detail}', file=sys.stderr)
                  raise

          deleted = 0
          deleted_bytes = 0
          rounds = 0
          while True:
              rounds += 1
              if rounds > 1000:
                  raise RuntimeError('Stopped after 1000 artifact-list rounds to avoid an infinite loop.')
              url = f'{api}/repos/{repo}/actions/artifacts?' + urllib.parse.urlencode({'per_page': 100, 'page': 1})
              payload = request('GET', url)
              artifacts = payload.get('artifacts', [])
              remaining = payload.get('total_count', len(artifacts))
              print(f'Round {rounds}: {remaining} artifact(s) reported, deleting {len(artifacts)} from page 1.')
              if not artifacts:
                  break
              for artifact in artifacts:
                  artifact_id = artifact['id']
                  delete_url = f'{api}/repos/{repo}/actions/artifacts/{artifact_id}'
                  try:
                      request('DELETE', delete_url)
                      deleted += 1
                      deleted_bytes += int(artifact.get('size_in_bytes') or 0)
                      print(f"Deleted artifact {artifact_id}: {artifact.get('name', '<unnamed>')} ({artifact.get('size_in_bytes', 0)} bytes).")
                  except urllib.error.HTTPError as exc:
                      if exc.code == 404:
                          print(f'Artifact {artifact_id} was already gone; continuing.')
                          continue
                      raise
              time.sleep(1)

          print(f'Deleted {deleted} artifact(s), approximately {deleted_bytes} bytes.')
          PY

      - name: Remove temporary workflow
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ['GH_TOKEN']
          repo = os.environ['GH_REPOSITORY']
          branch = os.environ['GH_REF_NAME']
          path = '.github/workflows/delete-artifacts-once.yml'
          api = 'https://api.github.com'
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'umalauncher-artifact-cleanup',
          }

          def request(method, url, body=None):
              data = None
              request_headers = dict(headers)
              if body is not None:
                  data = json.dumps(body).encode('utf-8')
                  request_headers['Content-Type'] = 'application/json'
              req = urllib.request.Request(url, data=data, headers=request_headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      raw = response.read()
                      return json.loads(raw.decode('utf-8')) if raw else None
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode('utf-8', errors='replace')
                  print(f'{method} {url} failed with HTTP {exc.code}: {detail}', file=sys.stderr)
                  raise

          encoded_path = urllib.parse.quote(path, safe='')
          content_url = f'{api}/repos/{repo}/contents/{encoded_path}?ref={urllib.parse.quote(branch, safe="")}'
          content = request('GET', content_url)
          if isinstance(content, list):
              raise RuntimeError(f'{path} unexpectedly resolved to a directory.')
          sha = content['sha']
          request('DELETE', f'{api}/repos/{repo}/contents/{encoded_path}', {
              'message': 'Remove temporary artifact cleanup workflow',
              'sha': sha,
              'branch': branch,
          })
          print(f'Removed {path} from {branch}.')
          PY
